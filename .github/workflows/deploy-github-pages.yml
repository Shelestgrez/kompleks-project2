name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Pages base path
        id: base
        shell: bash
        run: |
          NAME="${{ github.event.repository.name }}"
          if [[ "$NAME" == *.github.io ]]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
          else
            echo "path=/${NAME}/" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Repository secret VITE_API_URL = публичный URL API (https://... без слэша в конце).
      # На бэкенде: CORS_ORIGINS_EXTRA=https://<user>.github.io (origin без пути к репозиторию).
      - name: Install and build
        working-directory: frontend
        env:
          VITE_BASE_PATH: ${{ steps.base.outputs.path }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          npm install --no-audit --no-fund
          npm run build
          cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - id: deployment
        uses: actions/deploy-pages@v4
